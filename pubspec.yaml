name: ogarm
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  audioplayers: ^6.4.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  http: ^1.6.0
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/ogarm_logo_v2_1775470975044.png"
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: "assets/ogarm_logo_v2_1775470975044.png"

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
